<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emissão de Nota Fiscal - Casa Tapera</title>
    <link rel="stylesheet" href="../estilos/PainelDeControle.css">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">
    <style>
        /* Estilos específicos para a página de Nota Fiscal */
        .container-gerenciamento {
            width: 95%;
            max-width: 1200px;
            margin: 30px auto;
        }
        .form-emissao {
            background-color: #2a2a2a;
            padding: 25px;
            border-radius: 8px;
            margin-bottom: 30px;
            border: 1px solid #444;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .form-row {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        .form-group {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 200px;
        }
        .form-group label {
            color: #ccc;
            margin-bottom: 8px;
            font-size: 0.9em;
            font-family: 'Roboto', sans-serif;
        }
        .form-group input, .form-group select, .form-group textarea {
            background-color: #333;
            border: 1px solid #555;
            color: white;
            padding: 12px;
            border-radius: 4px;
            font-family: 'Roboto', sans-serif;
            font-size: 1em;
            transition: border-color 0.3s;
        }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            border-color: #f06400;
            outline: none;
        }
        .btn-emitir {
            background-color: #f06400;
            color: white;
            border: none;
            padding: 15px 25px;
            border-radius: 5px;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.3em;
            cursor: pointer;
            width: 100%;
            transition: background-color 0.2s, transform 0.1s;
            margin-top: 10px;
        }
        .btn-emitir:hover {
            background-color: #d15400;
            transform: translateY(-2px);
        }
        
        /* Estilos para a seção de pedidos recentes */
        .pedidos-recentes {
            margin-bottom: 40px;
            margin-top: 40px;
        }
        .pedidos-recentes h3 {
            color: #f06400;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.8em;
            margin-bottom: 15px;
        }
        .btn-gerar-nf {
            background-color: #0069d9;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9em;
            font-family: 'Roboto', sans-serif;
            font-weight: bold;
            transition: background-color 0.2s;
        }
        .btn-gerar-nf:hover {
            background-color: #0056b3;
        }

        /* Estilos do Modal de Impressão */
        .modal-overlay-nf {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            display: none; justify-content: center; align-items: center;
            z-index: 2000; opacity: 0; transition: opacity 0.3s ease;
        }
        .modal-overlay-nf.visivel { display: flex; opacity: 1; }
        .modal-container-nf {
            background-color: white;
            color: #333;
            padding: 20px;
            border-radius: 8px;
            width: 90%;
            max-width: 800px; /* Tamanho de uma folha A4 em paisagem aprox. */
            max-height: 90vh;
            overflow-y: auto;
            font-family: 'Arial', sans-serif;
        }
        .modal-actions-nf {
            text-align: right;
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid #ccc;
        }
        .modal-actions-nf button {
            padding: 10px 20px;
            border-radius: 5px;
            border: none;
            cursor: pointer;
            font-size: 1em;
            font-weight: bold;
        }
        #btn-fechar-impressao { background-color: #6c757d; color: white; }
        #btn-imprimir-de-verdade { background-color: #f06400; color: white; }

        /* Estilos para o conteúdo da nota (folha branca) */
        #conteudo-nota-impressao .invoice-header { display: flex; justify-content: space-between; align-items: flex-start; border-bottom: 2px solid #f06400; padding-bottom: 15px; margin-bottom: 20px; }
        #conteudo-nota-impressao .invoice-header img { max-width: 150px; }
        #conteudo-nota-impressao .company-details { text-align: right; }
        #conteudo-nota-impressao h4 { color: #f06400; margin-top: 0; margin-bottom: 5px; }
        #conteudo-nota-impressao .client-details { background-color: #f9f9f9; padding: 15px; border-radius: 5px; margin-bottom: 20px; }
        #conteudo-nota-impressao .invoice-body table { width: 100%; border-collapse: collapse; }
        #conteudo-nota-impressao .invoice-body th, #conteudo-nota-impressao .invoice-body td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        #conteudo-nota-impressao .invoice-body th { background-color: #f2f2f2; }
        #conteudo-nota-impressao .invoice-total { text-align: right; margin-top: 20px; font-size: 1.2em; font-weight: bold; }

        /* Estilos da Tabela de Histórico */
        .historico-notas {
            margin-top: 40px;
        }
        .historico-notas h3 {
            color: #f06400;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.8em;
            margin-bottom: 15px;
        }
        .tabela-notas {
            width: 100%;
            border-collapse: collapse;
            background-color: #2a2a2a;
            border-radius: 8px;
            overflow: hidden;
        }
        .tabela-notas th, .tabela-notas td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #444;
            font-family: 'Roboto', sans-serif;
        }
        .tabela-notas th {
            background-color: #333;
            color: #f06400;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.9em;
        }
        .tabela-notas td {
            color: #ddd;
        }
        .tabela-notas tr:last-child td {
            border-bottom: none;
        }
        .tabela-notas tr:hover {
            background-color: #333;
        }
        
        .status-badge {
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 0.8em;
            font-weight: bold;
            text-transform: uppercase;
        }
        .status-emitida { background-color: rgba(46, 204, 113, 0.2); color: #2ecc71; border: 1px solid #2ecc71; }
        .status-cancelada { background-color: rgba(231, 76, 60, 0.2); color: #e74c3c; border: 1px solid #e74c3c; }
        
        .btn-acao-nota {
            background: none;
            border: none;
            color: #ccc;
            cursor: pointer;
            font-size: 1.1em;
            margin-right: 10px;
            transition: color 0.2s;
        }
        .btn-acao-nota:hover { color: white; }
        
        .btn-limpar-historico {
            background-color: #f8240d;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.95em;
            font-family: 'Roboto', sans-serif;
            font-weight: bold;
            transition: background-color 0.2s, transform 0.1s;
            margin-left: 15px;
        }
        .btn-limpar-historico:hover {
            background-color: #ff1900;
            transform: translateY(-2px);
        }
        
        .header-historico {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 15px;
        }
        
        .header-historico h3 {
            margin: 0;
        }
        
        @media (max-width: 768px) {
            .form-row { flex-direction: column; gap: 10px; }
            .tabela-notas { display: block; overflow-x: auto; }
        }

        @media print {
            body * { visibility: hidden; }
            .modal-overlay-nf, .modal-container-nf, #conteudo-nota-impressao, #conteudo-nota-impressao * {
                visibility: visible;
            }
            .modal-overlay-nf {
                position: absolute; left: 0; top: 0; background: none;
            }
            .modal-container-nf {
                box-shadow: none; border: none; width: 100%; max-width: 100%; padding: 0;
            }
            .no-print { display: none; }
        }

    </style>
</head>
<body>
    <header class="cabecalho-painel">
        <a href="PainelDeControle.html"><img src="../imagens/Logo_Tapera.jpeg" alt="Logotipo Casa Tapera" class="imagem-logo"></a>
        <h1>Emissão de Nota Fiscal</h1>
        <a href="PainelDeControle.html" class="icone-voltar" title="Voltar ao Painel">
            <i class="fas fa-arrow-left"></i>
        </a>
    </header>

    <main class="painel-principal">
        <div class="container-gerenciamento">
            <h2 style="color: #f06400; font-family: 'Bebas Neue'; margin-bottom: 20px;">Emissão de Notas Fiscais</h2>

            <!-- Seção de Pedidos Recentes -->
            <div class="pedidos-recentes">
                <h3><i class="fas fa-receipt"></i> Pedidos Finalizados (Prontos para Emissão)</h3>
                <div style="overflow-x: auto;">
                    <table class="tabela-notas">
                        <thead>
                            <tr>
                                <th>Cliente</th>
                                <th>Data</th>
                                <th>Valor</th>
                                <th>Ação</th>
                            </tr>
                        </thead>
                        <tbody id="lista-pedidos-recentes">
                            <!-- Conteúdo gerado via JavaScript -->
                        </tbody>
                    </table>
                </div>
            </div>

            <div class="historico-notas">
                <div class="header-historico">
                    <h3><i class="fas fa-history"></i> Histórico de Notas Emitidas</h3>
                    <button id="btn-limpar-historico" class="btn-limpar-historico" title="Limpar todo o histórico de notas">
                        <i class="fas fa-trash-alt"></i> Limpar Histórico
                    </button>
                </div>
                <div style="overflow-x: auto;">
                    <table class="tabela-notas">
                        <thead>
                            <tr>
                                <th>Nº Nota</th>
                                <th>Data</th>
                                <th>Cliente</th>
                                <th>Valor</th>
                                <th>Status</th>
                                <th>Ações</th>
                            </tr>
                        </thead>
                        <tbody id="lista-notas">
                            <!-- Conteúdo gerado via JavaScript -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <footer class="rodape-copyright">
        <p>&copy; 2026 CASA TAPERA. TODOS OS DIREITOS RESERVADOS | DESENVOLVIDO POR EQUIPE <a href="https://www.instagram.com/s.aib0t/" target="_blank" rel="noopener noreferrer" class="link-desenvolvedor"><span class="nome-desenvolvedor">S.AIB0T</span></a></p>
    </footer>

    <!-- Modal para Impressão de Nota -->
    <div id="modal-impressao" class="modal-overlay-nf">
        <div class="modal-container-nf">
            <div id="conteudo-nota-impressao">
                <!-- Conteúdo da nota gerado via JS -->
            </div>
            <div class="modal-actions-nf no-print">
                <button id="btn-fechar-impressao">Fechar</button>
                <button id="btn-imprimir-de-verdade">Imprimir</button>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const listaNotas = document.getElementById('lista-notas');
            const listaPedidosRecentes = document.getElementById('lista-pedidos-recentes');

            // Modal de Impressão
            const modalImpressao = document.getElementById('modal-impressao');
            const conteudoImpressao = document.getElementById('conteudo-nota-impressao');
            const btnFecharImpressao = document.getElementById('btn-fechar-impressao');
            const btnImprimir = document.getElementById('btn-imprimir-de-verdade');
            const btnLimparHistorico = document.getElementById('btn-limpar-historico');
            
            // Carrega notas salvas ou inicia array vazio
            let notas = JSON.parse(localStorage.getItem('notasFiscaisTapera')) || [];

            function renderizarPedidosRecentes() {
                const pedidos = JSON.parse(localStorage.getItem('pedidosTapera')) || [];
                listaPedidosRecentes.innerHTML = '';

                if (pedidos.length === 0) {
                    listaPedidosRecentes.innerHTML = '<tr><td colspan="4" style="text-align: center; color: #888;">Nenhum pedido recente encontrado.</td></tr>';
                    return;
                }

                // Filtra apenas pedidos finalizados e pega os 10 mais recentes
                const pedidosRecentes = pedidos
                    .filter(p => p.status === 'finalizado')
                    .sort((a, b) => parseInt(b.id.split('-')[1]) - parseInt(a.id.split('-')[1]))
                    .slice(0, 10);

                pedidosRecentes.forEach(pedido => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${pedido.nomeCliente}</td>
                        <td>${new Date(parseInt(pedido.id.split('-')[1])).toLocaleDateString('pt-BR')}</td>
                        <td style="color: #ffc600;">${parseFloat(pedido.valorFinal).toLocaleString('pt-BR', {style: 'currency', currency: 'BRL'})}</td>
                        <td>
                            <button class="btn-gerar-nf" onclick="gerarNotaFiscalDoPedido('${pedido.id}')">Gerar NF</button>
                        </td>
                    `;
                    listaPedidosRecentes.appendChild(tr);
                });
            }

            window.gerarNotaFiscalDoPedido = function(pedidoId) {
                const pedidos = JSON.parse(localStorage.getItem('pedidosTapera')) || [];
                const pedido = pedidos.find(p => p.id === pedidoId);

                if (!pedido) {
                    alert('Pedido não encontrado!');
                    return;
                }

                // Monta a descrição a partir dos itens do pedido
                let descricao = `Referente ao pedido #${pedido.id.split('-')[1]}:\n`;
                for (const nomeItem in pedido.items) {
                    const item = pedido.items[nomeItem];
                    descricao += `- ${item.quantity}x ${nomeItem}\n`;
                }

                // Gera número sequencial simples
                const proximoNumero = notas.length > 0 ? Math.max(...notas.map(n => n.numero)) + 1 : 2025001;

                const novaNota = {
                    id: 'nota-' + proximoNumero,
                    numero: proximoNumero,
                    cliente: pedido.nomeCliente,
                    doc: '', // CPF/CNPJ não está no pedido
                    email: '', // E-mail não está no pedido
                    data: new Date().toISOString().split('T')[0],
                    hora: new Date().toISOString(),
                    descricao: descricao.trim(),
                    valor: pedido.valorFinal,
                    pagamento: pedido.metodoPagamento,
                    status: 'Emitida'
                };

                notas.push(novaNota);
                localStorage.setItem('notasFiscaisTapera', JSON.stringify(notas));
                
                renderizarNotas();
                imprimirNota(novaNota.numero); // Abre o modal com a nota gerada
            }

            function renderizarNotas() {
                listaNotas.innerHTML = '';
                if (notas.length === 0) {
                    listaNotas.innerHTML = '<tr><td colspan="6" style="text-align: center; color: #888; padding: 30px;">Nenhuma nota fiscal emitida ainda.</td></tr>';
                    return;
                }

                notas.sort((a, b) => b.numero - a.numero).forEach(nota => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td><strong>#${nota.numero}</strong></td>
                        <td>${new Date(nota.data + 'T00:00:00').toLocaleDateString('pt-BR')}</td>
                        <td>${nota.cliente}</td>
                        <td style="color: #ffc600;">${parseFloat(nota.valor).toLocaleString('pt-BR', {style: 'currency', currency: 'BRL'})}</td>
                        <td><span class="status-badge ${nota.status === 'Emitida' ? 'status-emitida' : 'status-cancelada'}">${nota.status}</span></td>
                        <td>
                            <button class="btn-acao-nota" onclick="imprimirNota(${nota.numero})" title="Imprimir / Visualizar"><i class="fas fa-print"></i></button>
                            ${nota.status === 'Emitida' ? `<button class="btn-acao-nota" onclick="cancelarNota(${nota.numero})" title="Cancelar Nota" style="color: #e74c3c;"><i class="fas fa-ban"></i></button>` : ''}
                        </td>
                    `;
                    listaNotas.appendChild(tr);
                });
            }

            window.imprimirNota = function(numero) {
                const nota = notas.find(n => n.numero === numero);
                if (!nota) return;

                // Função interna para mascarar CPF/CNPJ no documento impresso
                const formatarDoc = (v) => {
                    v = (v || "").replace(/\D/g, "");
                    if (v.length === 11) return v.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/, "$1.$2.$3-$4");
                    if (v.length === 14) return v.replace(/(\d{2})(\d{3})(\d{3})(\d{4})(\d{2})/, "$1.$2.$3/$4-$5");
                    return v || 'Não informado';
                };

                const htmlNota = `
                    <div class="invoice-header">
                        <img src="../imagens/Logo_Tapera.jpeg" alt="Logo Casa Tapera">
                        <div class="company-details">
                            <h4>CASA TAPERA</h4>
                            <p>
                                RUA JORGE PEREIRA NUNES, 2411<br>
                                ABERTA DOS MORROS, PORTO ALEGRE - RS<br>
                                CNPJ: 55.840.113/0001-97
                            </p>
                        </div>
                    </div>
                    <div class="client-details">
                        <h4>Dados do Cliente</h4>
                        <p>
                            <strong>Nome/Razão Social:</strong> ${nota.cliente}<br>
                            <strong>CPF/CNPJ:</strong> ${formatarDoc(nota.doc)}<br>
                            <strong>E-mail:</strong> ${nota.email || 'Não informado'}
                        </p>
                    </div>
                    <div class="invoice-body">
                        <h4>Detalhes da Nota Fiscal #${nota.numero}</h4>
                        <table>
                            <thead><tr><th>Discriminação dos Serviços/Produtos</th></tr></thead>
                            <tbody><tr><td style="white-space: pre-wrap;">${nota.descricao}</td></tr></tbody>
                        </table>
                        <div class="invoice-total">
                            <p>Forma de Pagamento: <strong>${nota.pagamento}</strong></p>
                            <p>VALOR TOTAL: <strong>${parseFloat(nota.valor).toLocaleString('pt-BR', {style: 'currency', currency: 'BRL'})}</strong></p>
                        </div>
                    </div>
                    <p style="text-align: center; font-size: 0.8em; margin-top: 30px; color: #888;">Documento sem valor fiscal - Apenas para simples conferência.</p>
                `;

                conteudoImpressao.innerHTML = htmlNota;
                modalImpressao.classList.add('visivel');
            };

            function adicionarALixeira(tipo, dado, origem) {
                const lixeira = JSON.parse(localStorage.getItem('casaTaperaLixeira')) || [];
                lixeira.unshift({
                    id: `trash-${Date.now()}-${Math.floor(Math.random() * 1000)}`,
                    tipo, dado, origem,
                    dataExclusao: new Date().toISOString()
                });
                localStorage.setItem('casaTaperaLixeira', JSON.stringify(lixeira));
            }

            window.cancelarNota = function(numero) {
                if(confirm(`ATENÇÃO: Deseja realmente cancelar a Nota Fiscal #${numero}? Esta ação será salva na lixeira.`)) {
                    const notaIndex = notas.findIndex(n => n.numero === numero);
                    if(notaIndex !== -1) {
                        const nota = notas[notaIndex];
                        const valorNumerico = parseFloat(nota.valor) || 0;
                        // Enviar à lixeira
                        adicionarALixeira('nota', {
                            id: nota.id || ('nota-' + nota.numero),
                            numero: nota.numero,
                            cliente: nota.cliente,
                            valor: valorNumerico,
                            valorTotal: valorNumerico,
                            data: nota.data,
                            hora: nota.hora || new Date().toISOString(),
                            status: nota.status,
                            descricao: nota.descricao,
                            doc: nota.doc,
                            email: nota.email,
                            pagamento: nota.pagamento,
                            originalIndex: notaIndex
                        }, 'Emissão Nota Fiscal');
                        
                        // Remover de notasFiscaisTapera
                        notas.splice(notaIndex, 1);
                        localStorage.setItem('notasFiscaisTapera', JSON.stringify(notas));
                        renderizarNotas();
                        
                        // Sincronizar com outras abas
                        window.dispatchEvent(new StorageEvent('storage', {
                            key: 'casaTaperaLixeira',
                            newValue: localStorage.getItem('casaTaperaLixeira')
                        }));
                    }
                }
            };

            window.limparHistoricoNotas = function() {
                if(confirm('ATENÇÃO: Tem certeza que deseja limpar todo o histórico de notas emitidas? Esta ação é irreversível.\n\nTodas as notas serão movidas para a lixeira.')) {
                    // Mover todas as notas para a lixeira
                    notas.forEach((nota, index) => {
                        const valorNumerico = parseFloat(nota.valor) || 0;
                        adicionarALixeira('nota', {
                            id: nota.id || ('nota-' + nota.numero),
                            numero: nota.numero,
                            cliente: nota.cliente,
                            valor: valorNumerico,
                            valorTotal: valorNumerico,
                            data: nota.data,
                            hora: nota.hora || new Date().toISOString(),
                            status: nota.status,
                            descricao: nota.descricao,
                            doc: nota.doc,
                            email: nota.email,
                            pagamento: nota.pagamento,
                            originalIndex: index
                        }, 'Emissão Nota Fiscal');
                    });
                    
                    // Limpar todas as notas
                    notas = [];
                    localStorage.setItem('notasFiscaisTapera', JSON.stringify(notas));
                    renderizarNotas();
                    
                    // Sincronizar com outras abas
                    window.dispatchEvent(new StorageEvent('storage', {
                        key: 'casaTaperaLixeira',
                        newValue: localStorage.getItem('casaTaperaLixeira')
                    }));
                    
                    alert('Histórico limpo com sucesso! Todas as notas foram movidas para a lixeira.');
                }
            };

            // Eventos do modal de impressão
            btnFecharImpressao.addEventListener('click', () => modalImpressao.classList.remove('visivel'));
            btnImprimir.addEventListener('click', () => window.print());
            btnLimparHistorico.addEventListener('click', () => limparHistoricoNotas());
            modalImpressao.addEventListener('click', (e) => {
                if (e.target === modalImpressao) modalImpressao.classList.remove('visivel');
            });

            // Sincronização com outras abas/janelas
            window.addEventListener('storage', (e) => {
                if (e.key === 'notasFiscaisTapera') {
                    notas = JSON.parse(e.newValue) || [];
                    renderizarNotas();
                }
            });

            // Sincronização com a mesma aba (quando restaura da lixeira)
            window.addEventListener('notasFiscaisAtualizadas', (e) => {
                notas = e.detail || [];
                renderizarNotas();
            });

            // Renderização inicial
            renderizarPedidosRecentes();
            renderizarNotas();
        });
    </script>
    <!-- VLibras Widget -->
    <div vw class="enabled">
        <div vw-access-button class="active"></div>
        <div vw-plugin-wrapper>
            <div class="vw-plugin-top-wrapper"></div>
        </div>
    </div>
