<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cupons de Desconto - Casa Tapera</title>
    <link rel="stylesheet" href="../estilos/PainelDeControle.css">
    <link rel="stylesheet" href="../estilos/CuponsDesconto.css">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">
    <style>
        .container-gerenciamento {
            width: 95%;
            max-width: 1200px;
            margin: 30px auto;
        }
    </style>
</head>
<body>
    <header class="cabecalho-painel">
        <a href="PainelDeControle.html"><img src="../imagens/Logo_Tapera.jpeg" alt="Logotipo Casa Tapera" class="imagem-logo"></a>
        <h1>Cupons e Links de Desconto</h1>
        <a href="PainelDeControle.html" class="icone-voltar" title="Voltar ao Painel">
            <i class="fas fa-arrow-left"></i>
        </a>
    </header>

    <main class="painel-principal">
        <div class="container-gerenciamento">
            <!-- Seção para Criar Novo Cupom -->
            <div class="secao-cupom" id="secao-criar-cupom">
                <h2><i class="fas fa-plus-circle"></i> Criar Novo Cupom</h2>
                <form id="form-criar-cupom" class="form-cupom">
                    <div class="campo-grupo">
                        <div class="campo-form">
                            <label for="codigo-cupom">Código do Cupom (Ex: BEMVINDO10)</label>
                            <input type="text" id="codigo-cupom" required placeholder="Sem espaços ou acentos">
                        </div>
                        <div class="campo-form">
                            <label for="tipo-desconto">Tipo de Desconto</label>
                            <select id="tipo-desconto">
                                <option value="percentual">Porcentagem (%)</option>
                                <option value="fixo">Valor Fixo (R$)</option>
                            </select>
                        </div>
                    </div>
                    <div class="campo-grupo">
                        <div class="campo-form">
                            <label for="valor-desconto">Valor do Desconto</label>
                            <input type="number" id="valor-desconto" step="0.01" required placeholder="Ex: 10 para 10% ou 5 para R$5,00">
                        </div>
                    </div>
                    <button type="submit" class="btn-principal">Criar Cupom</button>
                </form>
            </div>

            <!-- Seção para Listar Cupons Ativos -->
            <div class="secao-cupom" id="secao-listar-cupons">
                <h2><i class="fas fa-tags"></i> Cupons Ativos</h2>
                <div id="lista-cupons-ativos" class="lista-cupons">
                    <!-- Cupons serão inseridos aqui pelo JavaScript -->
                    <p class="sem-cupons-mensagem">Nenhum cupom ativo no momento.</p>
                </div>
            </div>
        </div>
    </main>

    <footer class="rodape-copyright">
        <p>&copy; 2026 CASA TAPERA. TODOS OS DIREITOS RESERVADOS | DESENVOLVIDO POR EQUIPE <a href="https://www.instagram.com/s.aib0t/" target="_blank" rel="noopener noreferrer" class="link-desenvolvedor"><span class="nome-desenvolvedor">S.AIB0T</span></a></p>
    </footer>

    <!-- Template para o card do cupom -->
    <template id="template-cupom-card">
        <div class="cupom-card">
            <div class="info-cupom">
                <strong class="codigo-cupom-card"></strong>
                <span class="valor-cupom-card"></span>
            </div>
            <div class="acoes-cupom">
                <button class="btn-acao-cupom btn-copiar-link" title="Copiar Link de Desconto"><i class="fas fa-link"></i> Copiar Link</button>
                <button class="btn-acao-cupom btn-excluir-cupom" title="Excluir Cupom"><i class="fas fa-trash"></i> Excluir</button>
            </div>
        </div>
    </template>

    <script src="../animações/CuponsDesconto.js"></script>
    <!-- VLibras Widget -->
    <div vw class="enabled">
        <div vw-access-button class="active"></div>
        <div vw-plugin-wrapper>
            <div class="vw-plugin-top-wrapper"></div>
        </div>
    </div>
    <script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>
    <script>
        new window.VLibras.Widget('https://vlibras.gov.br/app');
    </script>
</body>
</html>
