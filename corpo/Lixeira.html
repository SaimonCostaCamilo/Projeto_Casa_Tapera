<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lixeira Geral - Casa Tapera</title>
    <link rel="stylesheet" href="../estilos/PainelDeControle.css">
    <link rel="stylesheet" href="../estilos/Lixeira.css">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">
    <style>
        #btn-limpar-lixeira.btn-perigo {
            padding: 10px 20px;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.2em;
            background-color: var(--color-black);
            border: 2px solid var(--color-orange);
            color: var(--color-white);
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        #btn-limpar-lixeira.btn-perigo:hover {
            background-color: var(--color-red);
            border-color: var(--color-red);
            color: var(--color-white);
        }
    </style>
</head>
<body>
    <header class="cabecalho-painel">
        <a href="PainelDeControle.html"><img src="../imagens/Logo_Tapera.jpeg" alt="Logotipo Casa Tapera" class="imagem-logo"></a>
        <h1>Lixeira Geral</h1>
        <a href="PainelDeControle.html" class="icone-voltar" title="Voltar ao Painel">
            <i class="fas fa-arrow-left"></i>
        </a>
    </header>

    <main class="painel-principal">
        <div class="container-gerenciamento">
            <div class="header-lixeira">
                <h2>CAMPOS EXCLUÍDOS</h2>
                <button id="btn-limpar-lixeira" class="btn-perigo">
                    <i class="fa-solid fa-trash-can"></i>
                    <i class="fa-solid fa-trash-can-arrow-up"></i>
                    Esvaziar Lixeira
                </button>
            </div>
            
            <div class="layout-lixeira-corpo">
                <!-- Sistema de Abas para Filtragem (Vertical) -->
                <div class="container-abas">
                    <button class="btn-aba active" data-origem="todos">Todos</button>
                    <button class="btn-aba" data-origem="Personalizar Cardápio">Cardápio</button>
                    <button class="btn-aba" data-origem="Painel de Controle">Pedidos</button>
                    <button class="btn-aba" data-origem="Gerenciador de Mesas">Mesas</button>
                    <button class="btn-aba" data-origem="Controle de Estoque">Estoque</button>
                    <button class="btn-aba" data-origem="Clientes Cadastrados">Clientes</button>
                    <button class="btn-aba" data-origem="Automações">Automações</button>
                    <button class="btn-aba" data-origem="Mensagens IA">Mensagens</button>
                    <button class="btn-aba" data-origem="Controle Fiscal">Fiscal</button>
                </div>

                <div id="grid-lixeira" class="grid-lixeira">
                    <!-- Preenchido via JavaScript -->
                </div>
            </div>
        </div>
    </main>

    <footer class="rodape-copyright">
        <p>&copy; 2026 CASA TAPERA | DESENVOLVIDO POR EQUIPE <a href="https://www.instagram.com/s.aib0t/" target="_blank" rel="noopener noreferrer" class="link-desenvolvedor"><span class="nome-desenvolvedor">S.AIB0T</span></a></p>
    </footer>

    <script src="../animações/Lixeira.js"></script>
    <!-- VLibras Widget -->
    <div vw class="enabled">
        <div vw-access-button class="active"></div>
        <div vw-plugin-wrapper>
            <div class="vw-plugin-top-wrapper"></div>
        </div>
    </div>
    <script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>
    <script>
        new window.VLibras.Widget('https://vlibras.gov.br/app');
    </script>
</body>
</html>
