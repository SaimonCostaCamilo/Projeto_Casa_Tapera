<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meus Pedidos - Casa Tapera</title>
    <link rel="stylesheet" href="../estilos/Projeto_Tapera.css">
    <link rel="stylesheet" href="../estilos/MeusPedidos.css">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">

<body>
    <header class="cabecalho">
        <img src="../imagens/Mascote-Tapera.2.jpeg" alt="Mascote Tapera" class="mascote-login">

            <div class="container-logo">

        <a href="index.html" class="icone-voltar" title="Voltar">

            <div class="secao-pedidos">
